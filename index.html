<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 刷题系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 刷题系统</h1>
            <div class="controls">
                <div class="control-group">
                    <label for="mode-select">刷题模式：</label>
                    <select id="mode-select">
                        <option value="sequential">顺序刷题</option>
                        <option value="random">随机刷题</option>
                        <option value="wrong">错题模式</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>题型筛选：</label>
                    <label><input type="checkbox" name="type-filter" value="judge" checked> 判断题</label>
                    <label><input type="checkbox" name="type-filter" value="single" checked> 单选题</label>
                    <label><input type="checkbox" name="type-filter" value="multi" checked> 多选题</label>
                </div>
            </div>
        </header>

        <main id="quiz-area">
            <div id="question" class="question-card">
                <!-- 题目渲染在这里 -->
                <p>正在加载题库...</p>
            </div>

            <div id="options" class="options-group">
                <!-- 选项渲染在这里 -->
            </div>

            <div class="action-bar">
                <button id="submit" class="btn btn-primary">提交答案</button>
                <button id="next-btn" class="btn btn-success" style="display: none;">下一题</button>
            </div>

            <div id="feedback" class="feedback-area">
                <div id="result"></div>
                <div id="explanation"></div>
                <div id="stats"></div>
                
                <div id="note-area" style="display: none;">
                    <h4>学习笔记：</h4>
                    <textarea id="note-text" placeholder="在这里输入你的笔记..."></textarea>
                    <button id="save-note" class="btn btn-secondary">保存笔记</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
